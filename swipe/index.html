<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Toss — Send</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050508;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
      touch-action: manipulation;
    }

    #fx-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: orb-drift 12s ease-in-out infinite;
    }

    .bg-orb.a { width: 280px; height: 280px; background: #1e3a8a; top: 20%; left: 10%; }
    .bg-orb.b { width: 220px; height: 220px; background: #312e81; bottom: 15%; right: 8%; animation-delay: -4s; animation-duration: 15s; }
    .bg-orb.c { width: 160px; height: 160px; background: #0c4a6e; top: 55%; left: 55%; animation-delay: -7s; animation-duration: 18s; }

    @keyframes orb-drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.08); }
      66% { transform: translate(-20px, 25px) scale(0.95); }
    }

    #swipe-zone {
      --progress: 0;
      --glow: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      width: 230px;
      height: 230px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 2;
      overflow: visible;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    #swipe-zone.launching,
    #swipe-zone.returning { pointer-events: none; }

    #swipe-core {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
      animation: idle-breathe 4.5s ease-in-out infinite;
      will-change: transform;
    }

    #swipe-zone.dragging #swipe-core { animation: none; transition: none; }
    #swipe-zone.spring-back #swipe-core { animation: none; transition: transform 0.5s cubic-bezier(0.34, 1.45, 0.64, 1); }
    #swipe-zone.charging #swipe-core { animation: charge-pulse 0.9s ease-in-out infinite; }
    #swipe-zone.ready #swipe-core { animation: ready-throb 1.1s ease-in-out infinite; }
    #swipe-zone.launching #swipe-core,
    #swipe-zone.dragging #swipe-core { animation: none; }

    .glow-disc {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      pointer-events: none;
      background: transparent;
      transform: translate(-50%, -50%);
      box-shadow:
        0 0 calc(18px + var(--glow) * 36px) rgba(96, 165, 250, calc(0.12 + var(--glow) * 0.38)),
        0 0 calc(40px + var(--glow) * 56px) rgba(59, 130, 246, calc(0.06 + var(--glow) * 0.22));
    }

    .glow-disc.inner { width: 186px; height: 186px; }
    .glow-disc.outer { width: 218px; height: 218px; animation: glow-pulse 3s ease-in-out infinite; }

    @keyframes glow-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(0.96); opacity: calc(0.35 + var(--glow) * 0.45); }
      50% { transform: translate(-50%, -50%) scale(1.05); opacity: calc(0.55 + var(--glow) * 0.45); }
    }

    @keyframes idle-breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.015) translateY(-4px); }
    }

    @keyframes charge-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes ready-throb {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.045) translateY(-6px); }
    }

    #ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      pointer-events: none;
      overflow: visible;
    }

    .ring-glow {
      fill: none;
      stroke: #93c5fd;
      stroke-width: 14;
      stroke-linecap: round;
      opacity: calc(var(--glow) * 0.55);
      filter: url(#soft-blur);
    }

    .ring-track { fill: none; stroke: #1a1a22; stroke-width: 5; }

    .ring-progress {
      fill: none;
      stroke: url(#ring-gradient);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.05s linear;
    }

    .ring-tip {
      fill: none;
      stroke: #e0f2fe;
      stroke-width: 8;
      stroke-linecap: round;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    #swipe-zone.charging .ring-tip,
    #swipe-zone.ready .ring-tip { opacity: calc(0.4 + var(--progress) * 0.6); }

    #swipe-zone.ready .ring-progress { stroke: url(#ring-gradient-ready); }

    #ripple {
      position: absolute;
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border-radius: 50%;
      border: 1px solid rgba(96, 165, 250, 0.5);
      pointer-events: none;
      opacity: 0;
      transform: scale(0.2);
    }

    #ripple.active { animation: ripple-out 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    @keyframes ripple-out {
      0% { opacity: 0.7; transform: scale(0.2); }
      100% { opacity: 0; transform: scale(4.5); }
    }

    #label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: "Syne", system-ui, sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #555;
      pointer-events: none;
      text-align: center;
      line-height: 1.7;
      transition: color 0.25s ease, opacity 0.25s ease, letter-spacing 0.3s ease;
    }

    #swipe-zone.charging #label { color: #94a3b8; letter-spacing: 0.22em; }
    #swipe-zone.ready #label { color: #bfdbfe; animation: label-glow 1.1s ease-in-out infinite; }

    @keyframes label-glow {
      0%, 100% { text-shadow: 0 0 8px rgba(96, 165, 250, 0.2); }
      50% { text-shadow: 0 0 18px rgba(147, 197, 253, 0.65); }
    }

    #swipe-zone.launching .ring-progress { stroke: #e0f2fe; }
    #swipe-zone.launching .ring-glow { opacity: 1; stroke-width: 18; }
    #swipe-zone.launching .glow-disc {
      box-shadow: 0 0 40px rgba(147, 197, 253, 0.9), 0 0 80px rgba(96, 165, 250, 0.55);
    }

    #swipe-zone.launching #label {
      opacity: 0;
      transform: translate(-50%, -80%);
      transition: opacity 0.12s, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #swipe-zone.shake #swipe-core { animation: shake-fail 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
    #swipe-zone.shake .ring-progress { stroke: #f87171; }
    #swipe-zone.shake .ring-glow { stroke: #fca5a5; opacity: 0.45; }

    #file-pick {
      position: fixed;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      max-width: min(92vw, 360px);
    }

    #pick-btn {
      display: inline-block;
      appearance: none;
      border: 1px solid rgba(96, 165, 250, 0.35);
      background: rgba(15, 23, 42, 0.72);
      color: #bfdbfe;
      font-family: "Syne", system-ui, sans-serif;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 12px 20px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    #file-pick.disabled {
      pointer-events: none;
      opacity: 0.45;
    }

    #file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }

    #phone-status {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #64748b;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(51, 65, 85, 0.5);
      background: rgba(15, 23, 42, 0.8);
    }

    #phone-status.ok { color: #86efac; border-color: rgba(34, 197, 94, 0.35); }
    #phone-status.err { color: #fca5a5; border-color: rgba(248, 113, 113, 0.35); }

    #pick-btn:active { background: rgba(30, 58, 138, 0.55); }
    #pick-btn.has-file {
      border-color: rgba(125, 211, 252, 0.55);
      color: #e0f2fe;
    }

    #file-name {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: #64748b;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 14px;
    }

    #file-name.ready { color: #93c5fd; }

    #status {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 4;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #64748b;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease, color 0.25s ease;
    }

    #status.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #status.ok { color: #86efac; }
    #status.err { color: #fca5a5; }

    @keyframes shake-fail {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      15% { transform: translateX(-12px) rotate(-2deg); }
      30% { transform: translateX(10px) rotate(2deg); }
      45% { transform: translateX(-8px) rotate(-1deg); }
      60% { transform: translateX(6px) rotate(1deg); }
      75% { transform: translateX(-3px); }
    }

    .ghost-trail {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(147, 197, 253, 0.35);
      pointer-events: none;
      opacity: 0;
    }

    .ghost-trail.spawn { animation: ghost-fade 0.5s ease-out forwards; }

    @keyframes ghost-fade {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.35); }
    }

    #fullscreen-btn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      width: 40px;
      height: 40px;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      background: rgba(18, 18, 22, 0.85);
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px);
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    #fullscreen-btn:hover,
    #fullscreen-btn:focus-visible {
      color: #cbd5e1;
      border-color: #3b82f6;
      background: rgba(30, 41, 59, 0.9);
      outline: none;
    }

    #fullscreen-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    #fullscreen-btn .icon-exit { display: none; }
    #fullscreen-btn.is-fullscreen .icon-enter { display: none; }
    #fullscreen-btn.is-fullscreen .icon-exit { display: block; }
  </style>
</head>
<body>
  <canvas id="fx-canvas"></canvas>
  <div class="bg-orb a"></div>
  <div class="bg-orb b"></div>
  <div class="bg-orb c"></div>

  <div id="swipe-zone">
    <div id="swipe-core">
      <div class="glow-disc outer"></div>
      <div class="glow-disc inner"></div>
      <svg id="ring" viewBox="0 0 120 120" aria-hidden="true">
        <defs>
          <filter id="soft-blur" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur id="glow-blur" stdDeviation="3" />
          </filter>
          <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2563eb" />
            <stop offset="50%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#7dd3fc" />
          </linearGradient>
          <linearGradient id="ring-gradient-ready" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#60a5fa">
              <animate attributeName="stop-color" values="#60a5fa;#e0f2fe;#60a5fa" dur="1.2s" repeatCount="indefinite" />
            </stop>
            <stop offset="100%" stop-color="#93c5fd">
              <animate attributeName="stop-color" values="#93c5fd;#38bdf8;#93c5fd" dur="1.2s" repeatCount="indefinite" />
            </stop>
          </linearGradient>
        </defs>
        <circle id="ring-glow" class="ring-glow" cx="60" cy="60" r="54" />
        <circle class="ring-track" cx="60" cy="60" r="54" />
        <circle id="ring-progress" class="ring-progress" cx="60" cy="60" r="54" />
        <circle id="ring-tip" class="ring-tip" cx="60" cy="60" r="54" />
      </svg>
      <div id="ripple"></div>
      <div id="label">LOAD FILE<br>THEN SWIPE</div>
    </div>
  </div>

  <div id="status" aria-live="polite"></div>
  <div id="phone-status">Connecting…</div>

  <div id="file-pick">
    <label id="pick-btn" for="file-input">Choose file</label>
    <div id="file-name"></div>
    <input id="file-input" type="file" accept="*/*">
  </div>

  <button id="fullscreen-btn" type="button" aria-label="Fullscreen" title="Fullscreen">
    <svg class="icon-enter" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M8 3H5a2 2 0 0 0-2 2v3" />
      <path d="M16 3h3a2 2 0 0 1 2 2v3" />
      <path d="M8 21H5a2 2 0 0 1-2-2v-3" />
      <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
    </svg>
    <svg class="icon-exit" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M9 3H5a2 2 0 0 0-2 2v4" />
      <path d="M15 3h4a2 2 0 0 1 2 2v4" />
      <path d="M9 21H5a2 2 0 0 1-2-2v-4" />
      <path d="M15 21h4a2 2 0 0 0 2-2v-4" />
    </svg>
  </button>

  <script>
    const CFG = {
      chargeIntervalMs: 40,
      chargeDurationMs: 2000,
      swipeThresholdPx: 80,
      launchDurationMs: 920,
      ringRadius: 54,
      tipArc: 3,
    };

    const RING_CIRCUMFERENCE = 2 * Math.PI * CFG.ringRadius;
    const CHARGE_STEP = CFG.chargeIntervalMs / CFG.chargeDurationMs;

    const $ = (id) => document.getElementById(id);
    const swipeZone = $("swipe-zone");
    const swipeCore = $("swipe-core");
    const ringProgress = $("ring-progress");
    const ringGlow = $("ring-glow");
    const ringTip = $("ring-tip");
    const glowBlur = $("glow-blur");
    const rippleEl = $("ripple");
    const fxCanvas = $("fx-canvas");
    const fullscreenBtn = $("fullscreen-btn");
    const pickBtn = $("pick-btn");
    const filePick = $("file-pick");
    const fileInput = $("file-input");
    const fileNameEl = $("file-name");
    const statusEl = $("status");
    const phoneStatusEl = $("phone-status");
    const labelEl = $("label");

    const ringArcs = [ringProgress, ringGlow, ringTip];
    const fxCtx = fxCanvas.getContext("2d");

    const state = {
      file: null,
      ws: null,
      progress: 0,
      chargeTimer: null,
      startY: 0,
      pointerDown: false,
      launching: false,
      statusTimer: null,
      wantFullscreen: false,
      userExitedFullscreen: false,
      reenterTimer: null,
      pull: { y: 0, scale: 1, targetY: 0, targetScale: 1 },
      parallax: { x: 0, y: 0, targetX: 0, targetY: 0 },
      launchAnim: null,
      returnAnim: null,
      viewport: { w: 0, h: 0 },
      ambient: [],
      burst: [],
      visualsActive: true,
    };

    function setLabel() {
      if (state.file) {
        labelEl.innerHTML = "HOLD<br>SWIPE UP";
      } else {
        labelEl.innerHTML = "LOAD FILE<br>THEN SWIPE";
      }
    }

    function setStatus(text, kind) {
      clearTimeout(state.statusTimer);
      statusEl.textContent = text;
      statusEl.className = kind ? `show ${kind}` : "show";
      state.statusTimer = setTimeout(() => {
        statusEl.className = "";
        statusEl.textContent = "";
      }, 2400);
    }

    function setSelectedFile(file) {
      state.file = file || null;
      if (state.file) {
        fileNameEl.textContent = state.file.name;
        fileNameEl.classList.add("ready");
        pickBtn.textContent = "Change file";
        pickBtn.classList.add("has-file");
      } else {
        fileNameEl.textContent = "";
        fileNameEl.classList.remove("ready");
        pickBtn.textContent = "Choose file";
        pickBtn.classList.remove("has-file");
        fileInput.value = "";
      }
      setLabel();
    }

    function notifyLaunch() {
      if (!state.file || !state.ws || state.ws.readyState !== WebSocket.OPEN) return;
      state.ws.send(JSON.stringify({
        type: "launch",
        name: state.file.name,
        size: state.file.size,
      }));
    }

    function connectRelay() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      state.ws = new WebSocket(proto + "//" + location.host);
      state.ws.onopen = () => {
        state.ws.send(JSON.stringify({ type: "phone-online" }));
      };
      state.ws.onclose = () => setTimeout(connectRelay, 1000);
      state.ws.onerror = () => state.ws.close();
    }

    async function checkConnection() {
      try {
        const res = await fetch("/api/ping", { cache: "no-store" });
        if (!res.ok) throw new Error("ping failed");
        phoneStatusEl.textContent = "Connected to Toss";
        phoneStatusEl.className = "ok";
      } catch {
        phoneStatusEl.textContent = "Cannot reach PC";
        phoneStatusEl.className = "err";
      }
    }

    function setLaunchingUi(on) {
      filePick.classList.toggle("disabled", on);
    }

    async function uploadSelectedFile() {
      if (!state.file) return;

      const body = new FormData();
      body.append("file", state.file);

      try {
        const res = await fetch("/api/upload", { method: "POST", body });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || "upload failed");
        }
        setStatus("File received on Toss", "ok");
        setSelectedFile(null);
      } catch (err) {
        setStatus("Upload failed", "err");
        console.error(err);
      }
    }

    fileInput.addEventListener("click", () => {
      if (isFullscreen()) state.wantFullscreen = true;
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      setSelectedFile(file || null);
      if (file) setStatus("Ready to launch", "");
      scheduleReenterFullscreen();
    });

    fileInput.addEventListener("cancel", () => {
      scheduleReenterFullscreen();
    });

    function initRing() {
      const gap = CFG.tipArc + " " + (RING_CIRCUMFERENCE - CFG.tipArc);
      ringArcs.forEach((arc) => {
        arc.style.strokeDasharray = arc === ringTip ? gap : String(RING_CIRCUMFERENCE);
        arc.style.strokeDashoffset = RING_CIRCUMFERENCE;
      });
    }

    function setRingOffset(offset) {
      ringArcs.forEach((arc) => { arc.style.strokeDashoffset = offset; });
    }

    function resetPull() {
      state.pull.y = state.pull.targetY = 0;
      state.pull.scale = state.pull.targetScale = 1;
    }

    function pullTargets(deltaY) {
      const d = Math.max(0, deltaY);
      if (state.progress >= 1) {
        const clamped = Math.min(d, 140);
        return { targetY: -clamped * 0.85, targetScale: 1 + clamped * 0.003 };
      }
      const clamped = Math.min(d, 22);
      return { targetY: -clamped * 0.14, targetScale: 1 + clamped * 0.002 };
    }

    function applyPull() {
      const { y, scale, targetY, targetScale } = state.pull;
      let s = scale;
      if (state.pointerDown && state.progress < 1 && Math.abs(y) < 0.5 && Math.abs(targetY) < 0.5) {
        s *= 0.96;
      }
      swipeCore.style.transform = "translate3d(0," + y + "px,0) scale(" + s + ")";
    }

    function cancelAnimations() {
      swipeCore.getAnimations().forEach((anim) => anim.cancel());
      if (state.launchAnim) { state.launchAnim.cancel(); state.launchAnim = null; }
      if (state.returnAnim) { state.returnAnim.cancel(); state.returnAnim = null; }
    }

    function resizeFx() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.viewport.w = window.innerWidth;
      state.viewport.h = window.innerHeight;
      fxCanvas.width = state.viewport.w * dpr;
      fxCanvas.height = state.viewport.h * dpr;
      fxCanvas.style.width = state.viewport.w + "px";
      fxCanvas.style.height = state.viewport.h + "px";
      fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.min(Math.floor((state.viewport.w * state.viewport.h) / 18000), 55);
      state.ambient = Array.from({ length: count }, () => ({
        x: Math.random() * state.viewport.w,
        y: Math.random() * state.viewport.h,
        r: Math.random() * 1.6 + 0.4,
        speed: Math.random() * 0.25 + 0.08,
        drift: Math.random() * Math.PI * 2,
        alpha: Math.random() * 0.35 + 0.08,
      }));
    }

    function drawAmbient() {
      const { w, h } = state.viewport;
      fxCtx.clearRect(0, 0, w, h);
      for (const p of state.ambient) {
        p.drift += 0.004;
        p.x += Math.cos(p.drift) * p.speed;
        p.y += Math.sin(p.drift) * p.speed - p.speed * 0.3;
        if (p.x < -10) p.x = w + 10;
        if (p.x > w + 10) p.x = -10;
        if (p.y < -10) p.y = h + 10;
        if (p.y > h + 10) p.y = -10;
        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fxCtx.fillStyle = "rgba(147, 197, 253," + p.alpha + ")";
        fxCtx.fill();
      }
    }

    function drawBurst() {
      if (!state.burst.length) return;
      const alive = [];
      for (const p of state.burst) {
        p.vy -= 0.18;
        p.vx *= 0.98;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.018;
        p.r *= 0.985;
        if (p.life <= 0) continue;
        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fxCtx.fillStyle = "rgba(" + p.color + "," + p.life + ")";
        fxCtx.fill();
        alive.push(p);
      }
      state.burst = alive;
    }

    function smoothDrag() {
      if (!state.pointerDown || state.launching) return;
      const pull = state.pull;
      pull.y += (pull.targetY - pull.y) * 0.38;
      pull.scale += (pull.targetScale - pull.scale) * 0.28;
      if (Math.abs(pull.targetY - pull.y) < 0.05) pull.y = pull.targetY;
      if (Math.abs(pull.targetScale - pull.scale) < 0.0005) pull.scale = pull.targetScale;
      applyPull();
    }

    function updateParallax() {
      if (state.launching || state.pointerDown) return;
      if (swipeZone.classList.contains("returning") || swipeZone.classList.contains("launching")) return;

      const p = state.parallax;
      p.x += (p.targetX - p.x) * 0.06;
      p.y += (p.targetY - p.y) * 0.06;
      const breathe = Math.sin(Date.now() / 2200) * 2;
      swipeZone.style.transform =
        "translate(calc(-50% + " + p.x + "px), calc(-50% + " + (p.y + breathe) + "px))";
    }

    function tick() {
      if (state.visualsActive) {
        drawAmbient();
        drawBurst();
        smoothDrag();
        updateParallax();
      }
      requestAnimationFrame(tick);
    }

    function spawnBurst() {
      const rect = swipeZone.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for (let i = 0; i < 48; i++) {
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
        const speed = Math.random() * 9 + 4;
        state.burst.push({
          x: cx + (Math.random() - 0.5) * 30,
          y: cy + (Math.random() - 0.5) * 30,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - Math.random() * 4,
          r: Math.random() * 4 + 1.5,
          life: Math.random() * 0.5 + 0.5,
          color: Math.random() > 0.5 ? "147, 197, 253" : "96, 165, 250",
        });
      }

      for (let g = 0; g < 3; g++) {
        setTimeout(spawnGhostTrail, g * 70);
      }
    }

    function spawnGhostTrail() {
      const ghost = document.createElement("div");
      ghost.className = "ghost-trail";
      swipeCore.appendChild(ghost);
      requestAnimationFrame(() => ghost.classList.add("spawn"));
      setTimeout(() => ghost.remove(), 520);
    }

    function spawnRipple(x, y) {
      const rect = swipeCore.getBoundingClientRect();
      rippleEl.style.left = (x - rect.left) + "px";
      rippleEl.style.top = (y - rect.top) + "px";
      rippleEl.classList.remove("active");
      void rippleEl.offsetWidth;
      rippleEl.classList.add("active");
    }

    function updateRing() {
      const offset = RING_CIRCUMFERENCE * (1 - state.progress);
      setRingOffset(offset);
      glowBlur.setAttribute("stdDeviation", String(2 + state.progress * 5));
      swipeZone.style.setProperty("--progress", state.progress);
      swipeZone.style.setProperty("--glow", state.progress);
      swipeZone.classList.toggle("charging", state.pointerDown && state.progress < 1);
      swipeZone.classList.toggle("ready", state.progress >= 1 && !state.launching);
    }

    function stopCharging() {
      clearInterval(state.chargeTimer);
      state.chargeTimer = null;
      swipeZone.classList.remove("charging");
    }

    function resetCharge() {
      stopCharging();
      state.progress = 0;
      swipeZone.classList.remove("ready");
      updateRing();
    }

    function startCharging() {
      stopCharging();
      state.chargeTimer = setInterval(() => {
        state.progress = Math.min(1, state.progress + CHARGE_STEP);
        updateRing();
        if (state.progress >= 1) stopCharging();
      }, CFG.chargeIntervalMs);
    }

    function springBack() {
      cancelAnimations();
      swipeZone.classList.add("spring-back");
      resetPull();
      swipeCore.style.transform = "";
      resetCharge();
      setTimeout(() => swipeZone.classList.remove("spring-back"), 520);
    }

    function shakeRing() {
      resetCharge();
      cancelAnimations();
      swipeZone.classList.remove("shake", "ready");
      swipeZone.classList.add("spring-back");
      resetPull();
      swipeCore.style.transform = "";

      setTimeout(() => {
        swipeZone.classList.remove("spring-back");
        void swipeZone.offsetWidth;
        swipeZone.classList.add("shake");
        setTimeout(() => {
          swipeZone.classList.remove("shake");
        }, 550);
      }, 300);
    }

    function launchCircle(fromY, fromScale) {
      state.launching = true;
      setLaunchingUi(true);
      cancelAnimations();
      swipeZone.classList.remove("ready", "charging", "spring-back");
      swipeZone.classList.add("launching");

      swipeCore.style.transform = "translate3d(0," + fromY + "px,0) scale(" + fromScale + ")";
      swipeCore.style.opacity = "1";
      spawnBurst();
      notifyLaunch();
      uploadSelectedFile();

      state.launchAnim = swipeCore.animate([
        { transform: "translate3d(0," + fromY + "px,0) scale(" + fromScale + ")", opacity: 1 },
        { transform: "translate3d(0," + (fromY + 14) + "px,0) scale(" + (fromScale * 1.1) + "," + (fromScale * 0.9) + ")", opacity: 1, offset: 0.07 },
        { transform: "translate3d(0," + (fromY - 55) + "px,0) scale(" + (fromScale * 0.97) + "," + (fromScale * 1.05) + ")", opacity: 1, offset: 0.2 },
        { transform: "translate3d(0," + (fromY - state.viewport.h * 1.15) + "px,0) scale(0.42,0.68)", opacity: 0 },
      ], {
        duration: CFG.launchDurationMs,
        easing: "cubic-bezier(0.12, 0.84, 0.18, 1)",
        fill: "forwards",
      });

      state.launchAnim.finished.then(() => {
        swipeZone.classList.remove("launching");
        swipeCore.style.opacity = "";
        swipeCore.style.transform = "";
        state.progress = 0;
        updateRing();
        returnCircle();
      }).catch(() => {});
    }

    function returnCircle() {
      if (state.returnAnim) state.returnAnim.cancel();

      swipeZone.classList.add("returning");
      swipeZone.style.opacity = "0";
      swipeZone.style.transform = "translate(-50%, -50%) scale(0.72)";
      swipeZone.style.filter = "blur(10px)";

      state.returnAnim = swipeZone.animate([
        { opacity: 0, transform: "translate(-50%, -50%) scale(0.72)", filter: "blur(10px)" },
        { opacity: 1, transform: "translate(-50%, -50%) scale(1.03)", filter: "blur(0px)", offset: 0.72 },
        { opacity: 1, transform: "translate(-50%, -50%) scale(1)", filter: "blur(0px)" },
      ], {
        duration: 680,
        easing: "cubic-bezier(0.22, 1, 0.36, 1)",
        fill: "forwards",
      });

      state.returnAnim.finished.then(() => {
        swipeZone.classList.remove("returning");
        swipeZone.style.opacity = "";
        swipeZone.style.transform = "";
        swipeZone.style.filter = "";
        state.launching = false;
        setLaunchingUi(false);
        state.returnAnim = null;
      }).catch(() => {});
    }

    function endPointer(swipeDelta) {
      state.pointerDown = false;
      swipeZone.classList.remove("dragging");
      stopCharging();

      if (swipeDelta > CFG.swipeThresholdPx && state.progress >= 1) {
        if (!state.file) {
          shakeRing();
          setStatus("Choose a file first", "err");
          return;
        }
        const { targetY, targetScale } = pullTargets(swipeDelta);
        state.pull.y = targetY;
        state.pull.scale = targetScale;
        state.pull.targetY = targetY;
        state.pull.targetScale = targetScale;
        applyPull();
        launchCircle(targetY, targetScale);
      } else if (swipeDelta > CFG.swipeThresholdPx) {
        shakeRing();
        setStatus("Hold longer, then swipe", "err");
      } else {
        springBack();
      }
    }

    swipeZone.addEventListener("pointerdown", (e) => {
      if (state.launching) return;
      e.preventDefault();
      cancelAnimations();
      state.pointerDown = true;
      state.startY = e.clientY;
      resetPull();
      swipeZone.classList.add("dragging");
      swipeZone.classList.remove("spring-back");
      swipeZone.setPointerCapture(e.pointerId);
      spawnRipple(e.clientX, e.clientY);
      startCharging();
      updateRing();
    });

    swipeZone.addEventListener("pointermove", (e) => {
      if (!state.pointerDown || state.launching) return;
      const targets = pullTargets(Math.max(0, state.startY - e.clientY));
      state.pull.targetY = targets.targetY;
      state.pull.targetScale = targets.targetScale;
    });

    swipeZone.addEventListener("pointerup", (e) => {
      if (!state.pointerDown) return;
      endPointer(state.startY - e.clientY);
    });

    swipeZone.addEventListener("pointercancel", () => {
      if (!state.pointerDown) return;
      state.pointerDown = false;
      swipeZone.classList.remove("dragging");
      springBack();
    });

    document.addEventListener("pointermove", (e) => {
      if (state.pointerDown || state.launching) return;
      const cx = state.viewport.w / 2;
      const cy = state.viewport.h / 2;
      state.parallax.targetX = ((e.clientX - cx) / cx) * 10;
      state.parallax.targetY = ((e.clientY - cy) / cy) * 10;
    });

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function enterFullscreen() {
      const el = document.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) return req.call(el);
      return Promise.reject(new Error("unsupported"));
    }

    function exitFullscreen() {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) return exit.call(document);
      return Promise.resolve();
    }

    function scheduleReenterFullscreen() {
      if (!state.wantFullscreen || state.userExitedFullscreen) return;
      clearTimeout(state.reenterTimer);
      state.reenterTimer = setTimeout(() => {
        if (!isFullscreen() && state.wantFullscreen && !state.userExitedFullscreen) {
          enterFullscreen().catch(() => {});
        }
      }, 400);
    }

    function updateFullscreenBtn() {
      const on = isFullscreen();
      fullscreenBtn.classList.toggle("is-fullscreen", on);
      const label = on ? "Exit fullscreen" : "Fullscreen";
      fullscreenBtn.setAttribute("aria-label", label);
      fullscreenBtn.title = label;
    }

    fullscreenBtn.addEventListener("click", () => {
      if (isFullscreen()) {
        state.userExitedFullscreen = true;
        state.wantFullscreen = false;
        exitFullscreen().catch(() => {});
      } else {
        state.userExitedFullscreen = false;
        state.wantFullscreen = true;
        enterFullscreen().catch(() => {});
      }
    });

    document.addEventListener("fullscreenchange", () => {
      updateFullscreenBtn();
      if (!isFullscreen() && state.wantFullscreen && !state.userExitedFullscreen) {
        scheduleReenterFullscreen();
      }
    });
    document.addEventListener("webkitfullscreenchange", () => {
      updateFullscreenBtn();
      if (!isFullscreen() && state.wantFullscreen && !state.userExitedFullscreen) {
        scheduleReenterFullscreen();
      }
    });

    window.addEventListener("focus", scheduleReenterFullscreen);
    window.addEventListener("pageshow", scheduleReenterFullscreen);

    document.addEventListener("visibilitychange", () => {
      state.visualsActive = !document.hidden;
      if (!document.hidden) scheduleReenterFullscreen();
    });

    window.addEventListener("resize", resizeFx);
    initRing();
    setLabel();
    resizeFx();
    updateFullscreenBtn();
    tick();
    checkConnection();
    setInterval(checkConnection, 10000);
    connectRelay();
  </script>
</body>
</html>
